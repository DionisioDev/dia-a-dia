/* ---------- persistência em camadas ---------- */
let store={mode:"mem",mem:null,fb:null};
async function initStore(){
  if(FIREBASE_CONFIG){
    try{
      const app=await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
      const fs=await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      const a=app.initializeApp(FIREBASE_CONFIG); const db=fs.getFirestore(a);
      store.fb={fs,db,ref:fs.doc(db,FB_DOC)}; store.mode="fb"; return;
    }catch(e){ console.warn("Firebase falhou, usando local",e); }
  }
  try{ localStorage.setItem("__t","1"); localStorage.removeItem("__t"); store.mode="local"; }
  catch(e){ store.mode="mem"; }
}
async function loadData(){
  try{
    if(store.mode==="fb"){ const s=await store.fb.fs.getDoc(store.fb.ref); if(s.exists()) return s.data().d; }
    else if(store.mode==="local"){ const r=localStorage.getItem("casa_fin"); if(r) return JSON.parse(r); }
    else if(store.mem) return store.mem;
  }catch(e){ console.warn(e); }
  return JSON.parse(JSON.stringify(SEED));
}
let saveT=null;
function saveData(){
  clearTimeout(saveT);
  saveT=setTimeout(async()=>{
    try{
      if(store.mode==="fb"){ await store.fb.fs.setDoc(store.fb.ref,{d:D}); }
      else if(store.mode==="local"){ localStorage.setItem("casa_fin",JSON.stringify(D)); }
      else { store.mem=JSON.parse(JSON.stringify(D)); }
    }catch(e){ console.warn("save",e); }
  },300);
}

/* ---------- estado + cálculos ---------- */
let D=null, charts={}, personView="Sah";
const totalIncome=()=>D.income.reduce((s,x)=>s+x.value,0);
const personalTotal=p=>D.personal[p].reduce((s,x)=>s+x.value,0);
function expenseByCat(){
  const m={}; CATS.forEach(c=>m[c]=0);
  D.expenses.forEach(e=>{ m[e.cat]=(m[e.cat]||0)+e.value; });
  m["Pessoal Sah"]=(m["Pessoal Sah"]||0)+personalTotal("Sah");
  m["Pessoal Dan"]=(m["Pessoal Dan"]||0)+personalTotal("Dan");
  return m;
}
const totalExpense=()=>{const m=expenseByCat();return Object.values(m).reduce((s,v)=>s+v,0);};
const totalDebt=()=>D.debts.reduce((s,x)=>s+x.saldo,0);
const plannedSurplus=()=>totalIncome()-Object.values(D.budget).reduce((s,v)=>s+v,0);

/* ---------- TABS ---------- */
const TABDEF=[
  {id:"geral",label:"Geral",icon:"dashboard"},
  {id:"lanc",label:"Lançamentos",icon:"list_alt"},
  {id:"cartoes",label:"Cartões",icon:"credit_card"},
  {id:"metas",label:"Metas",icon:"target"},
  {id:"dividas",label:"Dívidas",icon:"stairs"},
  {id:"pessoal",label:"Pessoal",icon:"shield_person"},
];
function buildTabs(){
  document.getElementById("tabs").innerHTML=TABDEF.map((t,i)=>
    `<button class="tab" role="tab" data-tab="${t.id}" aria-selected="${i===0}"><span class="ms" aria-hidden="true">${t.icon}</span><span class="lbl">${t.label}</span></button>`).join("");
  document.querySelectorAll(".tab").forEach(b=>b.addEventListener("click",()=>selectTab(b.dataset.tab)));
}
function selectTab(id){
  document.querySelectorAll(".tab").forEach(b=>b.setAttribute("aria-selected",b.dataset.tab===id));
  document.querySelectorAll("section").forEach(s=>s.classList.toggle("active",s.id==="t-"+id));
  renderTab(id);
}
function renderTab(id){ ({geral:renderGeral,lanc:renderLanc,cartoes:renderCartoes,metas:renderMetas,dividas:renderDividas,pessoal:renderPessoal}[id])(); }

/* ---------- GERAL ---------- */
function renderGeral(){
  const inc=totalIncome(), exp=totalExpense(), res=inc-exp, debt=totalDebt(), surplus=plannedSurplus();
  const meses=surplus>0?Math.ceil((4608+4000+3142+546.76)/surplus):"—";
  const el=document.getElementById("t-geral");
  el.innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="k">Receita do mês</div><div class="v pos">${BRL(inc)}</div></div>
      <div class="kpi"><div class="k">Despesa do mês</div><div class="v neg">${BRL(exp)}</div></div>
      <div class="kpi"><div class="k">Resultado do mês</div><div class="v ${res<0?'neg':'pos'}">${BRL(res)}</div>
        <div class="sub">${res<0?'<span class="pill red"><span class="ms" aria-hidden="true">trending_down</span> No vermelho</span>':'<span class="pill green">No azul</span>'}</div></div>
      <div class="kpi"><div class="k">Dívida a quitar</div><div class="v fin">${BRL(debt)}</div>
        <div class="sub">${D.debts.length} credores</div></div>
    </div>
    <div class="card" style="margin-top:4px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div class="k" style="font-size:12px;color:var(--muted);font-weight:500">Sobra planejada / mês</div>
          <div class="v" style="font-family:var(--disp);font-weight:700;font-size:22px;color:var(--green)">${BRL(surplus)}</div></div>
        <div style="text-align:right"><div class="k" style="font-size:12px;color:var(--muted);font-weight:500">Pra zerar as 3 faturas</div>
          <div class="v" style="font-family:var(--disp);font-weight:700;font-size:22px">~${meses} ${meses==="—"?"":"meses"}</div></div>
      </div>
    </div>
    <div class="h"><span class="ms" aria-hidden="true" style="color:var(--fin)">pie_chart</span> Despesas por categoria</div>
    <div class="card"><div class="chartbox"><canvas id="catChart"></canvas></div><div class="legend" id="catLegend"></div></div>
    <div class="h"><span class="ms" aria-hidden="true" style="color:var(--fin)">bar_chart</span> Dívida por credor</div>
    <div class="card"><div class="chartbox"><canvas id="debtChart"></canvas></div></div>
    <p class="tiny">Importado da planilha de vocês · edite em Lançamentos, Metas e Dívidas</p>`;
  drawCatChart(); drawDebtChart();
}
function drawCatChart(){
  const m=expenseByCat(); const ents=Object.entries(m).filter(([k,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if(charts.cat)charts.cat.destroy();
  charts.cat=new Chart(document.getElementById("catChart"),{type:"doughnut",
    data:{labels:ents.map(e=>e[0]),datasets:[{data:ents.map(e=>e[1]),backgroundColor:ents.map(e=>CAT_COLOR[e[0]]||"#888"),borderWidth:2,borderColor:"#FEFCF7"}]},
    options:{cutout:"62%",plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>" "+c.label+": "+BRL(c.parsed)}}}}});
  document.getElementById("catLegend").innerHTML=ents.map(e=>
    `<span class="li"><span class="d" style="background:${CAT_COLOR[e[0]]||'#888'}"></span>${e[0]} · ${BRL(e[1])}</span>`).join("");
}
function drawDebtChart(){
  const ds=[...D.debts].filter(d=>d.saldo>0).sort((a,b)=>b.saldo-a.saldo);
  if(charts.debt)charts.debt.destroy();
  charts.debt=new Chart(document.getElementById("debtChart"),{type:"bar",
    data:{labels:ds.map(d=>d.cred),datasets:[{data:ds.map(d=>d.saldo),backgroundColor:ds.map(d=>d.prio===1?"#A33B20":d.prio<=3?"#B56B4A":"#82704E"),borderRadius:6}]},
    options:{indexAxis:"y",plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>" "+BRL(c.parsed.x)}}},
      scales:{x:{ticks:{callback:v=>"R$ "+(v/1000)+"k"},grid:{color:"#E2D8BC"}},y:{ticks:{font:{size:11}},grid:{display:false}}}}});
}

/* ---------- LANÇAMENTOS ---------- */
function renderLanc(){
  const el=document.getElementById("t-lanc");
  el.innerHTML=`
    <div class="h"><span class="ms" aria-hidden="true">add</span> Novo lançamento</div>
    <div class="card">
      <div class="formgrid">
        <div class="full"><label class="fl">Descrição</label><input id="lDesc" placeholder="Ex: Conta de luz"></div>
        <div><label class="fl">Valor (R$)</label><input id="lVal" type="number" inputmode="decimal" placeholder="0,00"></div>
        <div><label class="fl">Tipo</label><select id="lTipo"><option value="Despesa">Despesa</option><option value="Receita">Receita</option></select></div>
        <div><label class="fl">Categoria</label><select id="lCat">${CATS.map(c=>`<option>${c}</option>`).join("")}</select></div>
        <div><label class="fl">Cartão / pagamento</label><select id="lCard">${CARDS.map(c=>`<option>${c}</option>`).join("")}</select></div>
        <div class="full"><button class="btn pri" id="lAdd"><span class="ms" aria-hidden="true">check</span> Adicionar</button></div>
      </div>
    </div>
    <div class="h"><span class="ms" aria-hidden="true" style="color:var(--green)">south_west</span> Receitas</div>
    <div class="card" id="incList"></div>
    <div class="h"><span class="ms" aria-hidden="true" style="color:var(--red)">north_east</span> Despesas <span class="muted" style="margin-left:auto;font-weight:400">pessoais aparecem só como total</span></div>
    <div class="card" id="expList"></div>`;
  // receitas
  document.getElementById("incList").innerHTML=D.income.map(x=>rowHtml(x.id,"income","payments",x.desc,x.cat,x.value,"pos")).join("")||emptyRow();
  // despesas (agrupa pessoais como total — privacidade visual)
  let rows=D.expenses.map(x=>rowHtml(x.id,"expense","receipt_long",x.desc,x.cat+" · "+x.card,x.value,"neg"));
  ["Sah","Dan"].forEach(p=>{ const t=personalTotal(p); if(t>0) rows.push(
    `<div class="row"><div class="ic" style="background:var(--${p==='Sah'?'sam':'dan'}-bg);color:var(--${p==='Sah'?'sam':'dan'})"><span class="ms" aria-hidden="true">lock</span></div>
      <div class="main"><div class="t">Pessoal ${p}</div><div class="s">total privado · detalhes na aba Pessoal</div></div>
      <div class="amt neg">${BRL(t)}</div></div>`); });
  document.getElementById("expList").innerHTML=rows.join("");
  document.getElementById("lAdd").addEventListener("click",addLanc);
  bindDeletes();
}
function rowHtml(id,kind,icon,title,sub,val,cls){
  return `<div class="row"><div class="ic"><span class="ms" aria-hidden="true">${icon}</span></div>
    <div class="main"><div class="t">${title}</div><div class="s">${sub}</div></div>
    <div class="amt ${cls}">${BRL(val)}</div>
    <button class="del" data-del="${kind}:${id}" aria-label="Excluir"><span class="ms" aria-hidden="true">close</span></button></div>`;
}
const emptyRow=()=>`<div class="muted" style="padding:6px 0">Nada por aqui ainda.</div>`;
function addLanc(){
  const desc=document.getElementById("lDesc").value.trim();
  const val=parseFloat(document.getElementById("lVal").value);
  if(!desc||!(val>0)){return;}
  const tipo=document.getElementById("lTipo").value, cat=document.getElementById("lCat").value, card=document.getElementById("lCard").value;
  if(tipo==="Receita") D.income.push({id:uid(),desc,cat,value:val});
  else if(cat==="Pessoal Sah") D.personal.Sah.push({id:uid(),desc,value:val});
  else if(cat==="Pessoal Dan") D.personal.Dan.push({id:uid(),desc,value:val});
  else D.expenses.push({id:uid(),desc,cat,card,value:val});
  saveData(); renderLanc();
}
function bindDeletes(){
  document.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",()=>{
    const [kind,id]=b.dataset.del.split(":");
    if(kind==="income") D.income=D.income.filter(x=>x.id!==id);
    if(kind==="expense") D.expenses=D.expenses.filter(x=>x.id!==id);
    if(kind==="psah") D.personal.Sah=D.personal.Sah.filter(x=>x.id!==id);
    if(kind==="pdan") D.personal.Dan=D.personal.Dan.filter(x=>x.id!==id);
    saveData(); renderTab(document.querySelector(".tab[aria-selected=true]").dataset.tab);
  }));
}

/* ---------- CARTÕES ---------- */
function renderCartoes(){
  const el=document.getElementById("t-cartoes");
  const byCard={}; CARDS.forEach(c=>byCard[c]=[]);
  D.expenses.forEach(e=>{ (byCard[e.card]=byCard[e.card]||[]).push(e); });
  let html=`<p class="muted" style="margin:8px 2px 4px">Fatura de cada cartão = soma do que foi lançado nele. Débito/PIX não é dívida.</p>`;
  CARDS.forEach(c=>{
    const items=byCard[c]||[]; const total=items.reduce((s,x)=>s+x.value,0);
    const isDebit=c==="Débito / PIX";
    html+=`<div class="h"><span class="ms" aria-hidden="true" style="color:${isDebit?'var(--green)':'var(--red)'}">credit_card</span> ${c}
      <span style="margin-left:auto;font-family:var(--disp);font-size:16px;color:${isDebit?'var(--green)':'var(--red)'}">${BRL(total)}</span></div>
      <div class="card">${items.length?items.map(x=>
        `<div class="row"><div class="main"><div class="t">${x.desc}</div><div class="s">${x.cat}</div></div><div class="amt">${BRL(x.value)}</div></div>`).join(""):emptyRow()}</div>`;
  });
  el.innerHTML=html;
}

/* ---------- METAS ---------- */
function renderMetas(){
  const el=document.getElementById("t-metas"); const real=expenseByCat();
  const catsMeta=["Moradia","Mercado","Pessoal Dan","Pessoal Sah","Pecúlio","Empréstimos","Cartões"];
  el.innerHTML=`<p class="muted" style="margin:8px 2px 4px">Meta = quanto vocês querem gastar. A barra mostra o real do mês.</p>
    <div class="card">${catsMeta.map(c=>{
      const plan=D.budget[c]||0, r=real[c]||0, pct=plan>0?Math.min(100,r/plan*100):(r>0?100:0), over=plan>0&&r>plan;
      return `<div class="meta">
        <div class="top2"><b>${c}</b><span class="num">${BRL(r)} / <input type="number" data-budget="${c}" value="${plan}" style="display:inline-block;width:84px"></span></div>
        <div class="bar"><span class="${over?'over':''}" style="width:${pct}%"></span></div>
        <div style="font-size:11.5px;color:${over?'var(--red)':'var(--muted)'};margin-top:5px">${over?'Estourou '+BRL(r-plan):(plan>0?'Sobra '+BRL(plan-r):'Sem meta definida')}</div>
      </div>`; }).join("")}</div>`;
  el.querySelectorAll("[data-budget]").forEach(inp=>inp.addEventListener("change",()=>{
    D.budget[inp.dataset.budget]=parseFloat(inp.value)||0; saveData(); renderMetas();
  }));
}

/* ---------- DÍVIDAS & PLANO ---------- */
function renderDividas(){
  const el=document.getElementById("t-dividas");
  const ds=[...D.debts].sort((a,b)=>a.prio-b.prio||b.saldo-a.saldo);
  const PR={1:["URGENTE","var(--red)","var(--red-bg)"],2:["Alta","var(--jun)","var(--jun-bg)"],3:["Alta","var(--jun)","var(--jun-bg)"],4:["Média","var(--fin-ink)","var(--fin-bg)"],5:["Acaba logo","var(--green)","var(--green-bg)"]};
  let html=`<div class="kpis" style="margin-top:8px">
    <div class="kpi"><div class="k">Buraco total</div><div class="v fin">${BRL(totalDebt())}</div></div>
    <div class="kpi"><div class="k">Parcelas / mês</div><div class="v">${BRL(D.debts.reduce((s,x)=>s+x.parcela,0))}</div></div></div>
    <div class="h"><span class="ms" aria-hidden="true">format_list_numbered</span> Ordem de ataque</div>`;
  ds.forEach(d=>{ const p=PR[d.prio]||PR[4];
    html+=`<div class="card" style="padding:13px 15px;margin-bottom:9px">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="main" style="flex:1"><div class="t" style="font-weight:600;font-size:15px">${d.cred}</div>
          <div class="s" style="font-size:12px;color:var(--muted);margin-top:2px">${d.tipo}${d.rest>0?` · faltam ${d.rest} de ${BRL(d.parcela)}`:''}</div></div>
        <div style="text-align:right"><div style="font-family:var(--disp);font-weight:700;font-size:16px;color:var(--fin-ink)">${BRL(d.saldo)}</div>
          <span class="pill" style="background:${p[2]};color:${p[1]};margin-top:4px">${p[0]}</span></div>
      </div>
      <div style="font-size:12.5px;color:var(--muted);margin-top:9px;padding-top:9px;border-top:1px solid var(--line)"><span class="ms" aria-hidden="true" style="color:var(--fin)">lightbulb</span> ${d.acao}</div>
    </div>`; });
  // plano
  html+=`<div class="h"><span class="ms" aria-hidden="true">checklist</span> Plano pra sair do vermelho</div>`;
  let lastStep=null;
  D.plan.forEach(p=>{
    if(p.step!==lastStep){ html+=`<div class="step">${p.step}</div>`; lastStep=p.step; }
    html+=`<div class="chk ${p.done?'done':''}" data-plan="${p.id}"><span class="box">${p.done?'<span class="ms" aria-hidden="true">check</span>':''}</span><span class="tx">${p.tx}</span></div>`;
  });
  html+=`<p class="tiny">Estratégia da própria planilha de vocês. Não é recomendação de investimento.</p>`;
  el.innerHTML=html;
  el.querySelectorAll("[data-plan]").forEach(c=>c.addEventListener("click",()=>{
    const p=D.plan.find(x=>x.id===c.dataset.plan); p.done=!p.done; saveData(); renderDividas();
  }));
}

/* ---------- PESSOAL ---------- */
function renderPessoal(){
  const el=document.getElementById("t-pessoal"); const p=personView; const key=p==="Sah"?"sam":"dan";
  el.innerHTML=`
    <div class="seg">
      <button class="sah" data-pv="Sah" aria-pressed="${p==='Sah'}">Sah</button>
      <button class="dan" data-pv="Dan" aria-pressed="${p==='Dan'}">Dan</button>
    </div>
    <div class="privacy"><span class="ms" aria-hidden="true">visibility_off</span><div>Privacidade visual: os itens daqui não aparecem detalhados na aba Geral nem em Lançamentos — só entra o <b>total</b> de R$ ${BRLc(personalTotal(p)).slice(3)} de ${p} na conta da casa.</div></div>
    <div class="kpi" style="margin-bottom:12px"><div class="k">Total pessoal de ${p}</div>
      <div class="v" style="color:var(--${key})">${BRL(personalTotal(p))}</div>
      <div class="sub">Meta: ${BRL(D.budget["Pessoal "+p]||0)} ${personalTotal(p)>(D.budget["Pessoal "+p]||0)?'· <span style="color:var(--red)">estourou</span>':'· dentro'}</div></div>
    <div class="card">
      <div class="formgrid">
        <div class="full"><label class="fl">No que ${p} gastou</label><input id="pDesc" placeholder="Ex: Dança"></div>
        <div><label class="fl">Valor (R$)</label><input id="pVal" type="number" inputmode="decimal" placeholder="0,00"></div>
        <div style="display:flex;align-items:flex-end"><button class="btn pri" id="pAdd"><span class="ms" aria-hidden="true">add</span> Adicionar</button></div>
      </div>
    </div>
    <div class="card">${D.personal[p].length?D.personal[p].map(x=>
      `<div class="row"><div class="main"><div class="t">${x.desc}</div></div><div class="amt neg">${BRL(x.value)}</div>
       <button class="del" data-del="${key==='sam'?'psah':'pdan'}:${x.id}" aria-label="Excluir"><span class="ms" aria-hidden="true">close</span></button></div>`).join(""):emptyRow()}</div>`;
  el.querySelectorAll("[data-pv]").forEach(b=>b.addEventListener("click",()=>{personView=b.dataset.pv;renderPessoal();}));
  document.getElementById("pAdd").addEventListener("click",()=>{
    const desc=document.getElementById("pDesc").value.trim(), val=parseFloat(document.getElementById("pVal").value);
    if(!desc||!(val>0))return;
    D.personal[p].push({id:uid(),desc,value:val}); saveData(); renderPessoal();
  });
  bindDeletes();
}

/* ---------- boot ---------- */
(async function(){
  await initStore();
  D=await loadData();
  const dot=document.getElementById("modeDot"), txt=document.getElementById("modeTxt");
  if(store.mode==="fb"){txt.textContent="sincronizado";dot.style.background="var(--green)";}
  else if(store.mode==="local"){txt.textContent="salvo neste aparelho";dot.style.background="var(--fin)";}
  else{txt.textContent="só nesta sessão";dot.style.background="var(--muted)";}
  if(window.Chart){Chart.defaults.color="#73603F";Chart.defaults.font.family="Inter";Chart.defaults.borderColor="#E2D8BC";
    if(window.matchMedia("(prefers-reduced-motion: reduce)").matches)Chart.defaults.animation=false;}
  buildTabs(); selectTab("geral");
})();
</script>

  if ("serviceWorker" in navigator) {
    addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
</script>
