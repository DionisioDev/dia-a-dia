<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Casa — Samara &amp; Daniel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F8F4E3; --surface:#FEFCF7; --ink:#5A352A; --muted:#82704E; --line:#E2D8BC; --soft:#F1EAD2;
    --sam-bg:#E7ECDF; --sam:#3F5238; --sam-dot:#5B7553;
    --dan-bg:#EDE3D6; --dan:#5A352A; --dan-dot:#835033;
    --jun-bg:#F5E2D7; --jun:#7A2E18; --jun-dot:#A33B20;
    --done:#B7AC8E;
    --disp:"Bricolage Grotesque", system-ui, sans-serif;
    --body:"Inter", system-ui, sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--body);line-height:1.5;
    padding:20px 16px 56px;display:flex;justify-content:center}
  .wrap{width:100%;max-width:560px}
  .eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:0}
  h1{font-family:var(--disp);font-weight:700;font-size:34px;letter-spacing:-.02em;margin:2px 0 0}
  /* progress */
  .top{display:flex;align-items:center;gap:18px;background:var(--surface);border:1px solid var(--line);
    border-radius:20px;padding:18px 20px;margin:18px 0 8px}
  .ring{flex:0 0 auto;position:relative;width:84px;height:84px}
  .ring svg{transform:rotate(-90deg)}
  .ring .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1}
  .ring .num b{font-family:var(--disp);font-size:22px;font-weight:700}
  .ring .num span{font-size:10px;color:var(--muted);margin-top:2px}
  .topmeta h2{font-family:var(--disp);font-weight:600;font-size:18px;margin:0 0 2px}
  .topmeta p{margin:0;color:var(--muted);font-size:13px}
  /* filter */
  .chips{display:flex;gap:8px;margin:14px 0 4px;flex-wrap:wrap}
  .chip{font-family:var(--body);font-size:13px;font-weight:500;border:1px solid var(--line);background:var(--surface);
    color:var(--muted);border-radius:999px;padding:7px 14px;cursor:pointer;transition:.15s}
  .chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  /* day groups */
  .day{margin-top:18px}
  .dayhead{display:flex;align-items:center;gap:8px;margin:0 0 8px;padding:0 4px}
  .dayhead h3{font-family:var(--disp);font-weight:600;font-size:15px;margin:0;letter-spacing:.01em}
  .today{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:var(--ink);
    border-radius:999px;padding:3px 8px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .task{display:flex;align-items:center;gap:13px;padding:14px 16px;cursor:pointer;border-top:1px solid var(--line);
    min-height:56px;transition:background .12s}
  .task:first-child{border-top:0}
  .task:active{background:#F4EEDB}
  .box{flex:0 0 auto;width:24px;height:24px;border-radius:8px;border:2px solid var(--line);display:flex;
    align-items:center;justify-content:center;transition:.15s}
  .box svg{width:14px;height:14px;opacity:0;transform:scale(.6);transition:.15s}
  .task .label{flex:1;font-size:15px;font-weight:500;transition:.15s}
  .task .who{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;
    padding:4px 9px;border-radius:999px}
  .who .d{width:7px;height:7px;border-radius:50%}
  .w-sam{background:var(--sam-bg);color:var(--sam)} .w-sam .d{background:var(--sam-dot)}
  .w-dan{background:var(--dan-bg);color:var(--dan)} .w-dan .d{background:var(--dan-dot)}
  .w-jun{background:var(--jun-bg);color:var(--jun)} .w-jun .d{background:var(--jun-dot)}
  .task.done .box{background:var(--sam-dot);border-color:var(--sam-dot)}
  .task.done .box svg{opacity:1;transform:scale(1)}
  .task.done .label{color:var(--done);text-decoration:line-through;text-decoration-color:var(--done)}
  .task.done .who{opacity:.45}
  /* occasional */
  .occ{margin-top:26px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 18px}
  .occ .row{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .occ h3{font-family:var(--disp);font-weight:600;font-size:15px;margin:0}
  .occ .meta{font-size:13px;color:var(--muted);margin:4px 0 0}
  .occ .meta.alert{color:var(--jun);font-weight:500}
  .btn{font-family:var(--body);font-size:13px;font-weight:600;border:1px solid var(--line);background:var(--paper);
    color:var(--ink);border-radius:10px;padding:9px 13px;cursor:pointer;white-space:nowrap}
  .btn:active{transform:scale(.97)}
  /* daily reminders */
  .reminders{margin-top:26px}
  .reminders .eyebrow{padding:0 4px}
  .rcard{margin-top:8px;background:transparent;border:1px dashed var(--line);border-radius:16px;padding:6px 4px}
  .rem{display:flex;gap:11px;align-items:flex-start;padding:9px 14px;font-size:14px}
  .rem .d{flex:0 0 auto;width:7px;height:7px;border-radius:50%;margin-top:7px}
  .rem b{font-weight:600}
  .foot{margin-top:24px;display:flex;justify-content:space-between;align-items:center;gap:12px;padding:0 4px}
  .foot .reset{font-size:13px;color:var(--muted);background:none;border:0;cursor:pointer;text-decoration:underline;
    text-underline-offset:2px;font-family:var(--body)}
  .note{font-size:12px;color:var(--muted)}
  .loading{text-align:center;color:var(--muted);padding:60px 0;font-size:14px}
  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>

<div class="wrap" id="app">
  <div class="loading">Carregando o painel…</div>
</div>

<script>
const TASKS = [
  {id:"seg_roupa", day:"Segunda", label:"Roupa clara na lava e seca (ligar de manhã)", who:"sam"},
  {id:"ter_banheiro", day:"Terça", label:"Banheiro — passada rápida", who:"sam"},
  {id:"qua_roupa", day:"Quarta", label:"Roupa escura na lava e seca", who:"sam"},
  {id:"qua_pano", day:"Quarta", label:"Passar pano no chão — sala + cozinha", who:"dan"},
  {id:"sex_po", day:"Sexta", label:"Tirar pó + organizar os quartos", who:"sam"},
  {id:"sex_banheiro", day:"Sexta", label:"Faxina pesada do banheiro", who:"dan"},
  {id:"sab_cozinha", day:"Sábado", label:"Faxina da cozinha (fogão, bancada, geladeira)", who:"sam"},
  {id:"sab_pano", day:"Sábado", label:"Passar pano no chão — casa toda", who:"jun"},
  {id:"sab_roupa", day:"Sábado", label:"Cama + toalhas + dobrar a roupa da semana", who:"dan"},
  {id:"dom_cozinhar", day:"Domingo", label:"Batch cooking + compras + cardápio", who:"jun"},
];
const DAYS = ["Segunda","Terça","Quarta","Quinta","Sexta","Sábado","Domingo"];
const WHO_NAME = {sam:"Samara", dan:"Daniel", jun:"Juntos"};
const REMINDERS = [
  {who:"jun", t:"<b>Louça:</b> quem cozinha não lava — nunca dormir com a pia cheia"},
  {who:"sam", t:"<b>Samara:</b> reset da pia no meio do dia"},
  {who:"dan", t:"<b>Daniel:</b> lixo quando encher + cozinhar nas noites livres (seg/qua/sex)"},
  {who:"jun", t:"<b>Os dois:</b> reset de 10 min antes de dormir"},
];
const JANELAS_DIAS = 15;

const hasStore = typeof window!=="undefined" && window.storage && typeof window.storage.get==="function";
const mem = {};
async function sGet(k){ if(!hasStore) return mem[k]??null; try{const r=await window.storage.get(k,true);return r?r.value:null;}catch(e){return null;} }
async function sSet(k,v){ if(!hasStore){mem[k]=v;return;} try{await window.storage.set(k,v,true);}catch(e){} }

function mondayOf(d){ const x=new Date(d); const off=(x.getDay()+6)%7; x.setDate(x.getDate()-off); x.setHours(0,0,0,0); return x; }
function weekKey(){ return "casa_week:"+mondayOf(new Date()).toISOString().slice(0,10); }
function fmtRange(){
  const mon=mondayOf(new Date()); const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const M=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  const a=`${mon.getDate()} de ${M[mon.getMonth()]}`, b=`${sun.getDate()} de ${M[sun.getMonth()]}`;
  return `Semana de ${a} a ${b}`;
}
function todayName(){ return DAYS[(new Date().getDay()+6)%7]; }
function daysSince(iso){ if(!iso) return null; const d=new Date(iso); const t=new Date(); d.setHours(0,0,0,0);t.setHours(0,0,0,0); return Math.round((t-d)/86400000); }

let state={}, occ={}, filter="all";

async function load(){
  try{ state=JSON.parse(await sGet(weekKey())||"{}"); }catch(e){ state={}; }
  try{ occ=JSON.parse(await sGet("casa_occ")||"{}"); }catch(e){ occ={}; }
  render();
}
async function saveWeek(){ await sSet(weekKey(), JSON.stringify(state)); }
async function saveOcc(){ await sSet("casa_occ", JSON.stringify(occ)); }

function checkSvg(c){ return `<svg viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>`; }

function render(){
  const visible = TASKS.filter(t=> filter==="all" || t.who===filter);
  const total = visible.length;
  const done = visible.filter(t=>state[t.id]).length;
  const left = total-done;
  const pct = total? done/total : 0;
  const C=2*Math.PI*36;
  const today = todayName();

  let days="";
  DAYS.forEach(dn=>{
    const list = visible.filter(t=>t.day===dn);
    if(!list.length) return;
    const isToday = dn===today;
    let rows="";
    list.forEach(t=>{
      const on = !!state[t.id];
      rows += `<div class="task ${on?"done":""}" role="checkbox" aria-checked="${on}" tabindex="0" data-id="${t.id}">
        <span class="box">${checkSvg("#fff")}</span>
        <span class="label">${t.label}</span>
        <span class="who w-${t.who}"><span class="d"></span>${WHO_NAME[t.who]}</span>
      </div>`;
    });
    days += `<section class="day"><div class="dayhead"><h3>${dn}</h3>${isToday?'<span class="today">hoje</span>':''}</div>
      <div class="card">${rows}</div></section>`;
  });

  const since = daysSince(occ.janelas);
  let occMeta;
  if(since===null) occMeta = `<p class="meta">Ainda não registrada — a cada ~${JANELAS_DIAS} dias</p>`;
  else if(since>=JANELAS_DIAS) occMeta = `<p class="meta alert">Feita há ${since} dia${since===1?"":"s"} — tá na hora</p>`;
  else occMeta = `<p class="meta">Feita há ${since} dia${since===1?"":"s"} · próxima em ~${JANELAS_DIAS-since} dias</p>`;

  let rem="";
  REMINDERS.forEach(r=>{ rem += `<div class="rem"><span class="d" style="background:var(--${r.who}-dot)"></span><span>${r.t}</span></div>`; });

  document.getElementById("app").innerHTML = `
    <p class="eyebrow">Cuidados da casa</p>
    <h1>Casa</h1>
    <div class="top">
      <div class="ring">
        <svg width="84" height="84"><circle cx="42" cy="42" r="36" fill="none" stroke="var(--line)" stroke-width="8"/>
          <circle cx="42" cy="42" r="36" fill="none" stroke="var(--sam-dot)" stroke-width="8" stroke-linecap="round"
            stroke-dasharray="${C}" stroke-dashoffset="${C*(1-pct)}"/></svg>
        <div class="num"><b>${done}/${total}</b><span>feitas</span></div>
      </div>
      <div class="topmeta">
        <h2>${left===0?"Tudo em dia 🎉":`Faltam ${left}`}</h2>
        <p>${fmtRange()}</p>
      </div>
    </div>

    <div class="chips">
      <button class="chip" data-f="all" aria-pressed="${filter==="all"}">Tudo</button>
      <button class="chip" data-f="sam" aria-pressed="${filter==="sam"}">Samara</button>
      <button class="chip" data-f="dan" aria-pressed="${filter==="dan"}">Daniel</button>
      <button class="chip" data-f="jun" aria-pressed="${filter==="jun"}">Juntos</button>
    </div>

    ${days}

    <div class="occ">
      <div class="row">
        <div><h3>Lavagem das janelas</h3>${occMeta}</div>
        <button class="btn" id="janBtn">Marcar feito hoje</button>
      </div>
    </div>

    <div class="reminders">
      <p class="eyebrow">Combinados do dia a dia</p>
      <div class="rcard">${rem}</div>
    </div>

    <div class="foot">
      <button class="reset" id="resetBtn">Limpar marcações da semana</button>
      ${hasStore?'':'<span class="note">modo teste — sem salvar</span>'}
    </div>
  `;

  document.querySelectorAll(".task").forEach(el=>{
    const toggle=()=>{ const id=el.dataset.id; state[id]=!state[id]; if(!state[id]) delete state[id]; saveWeek(); render(); };
    el.addEventListener("click",toggle);
    el.addEventListener("keydown",e=>{ if(e.key===" "||e.key==="Enter"){e.preventDefault();toggle();} });
  });
  document.querySelectorAll(".chip").forEach(c=> c.addEventListener("click",()=>{ filter=c.dataset.f; render(); }));
  document.getElementById("janBtn").addEventListener("click",()=>{ occ.janelas=new Date().toISOString().slice(0,10); saveOcc(); render(); });
  document.getElementById("resetBtn").addEventListener("click",()=>{ if(confirm("Limpar todas as marcações desta semana?")){ state={}; saveWeek(); render(); } });
}

load();
</script>
